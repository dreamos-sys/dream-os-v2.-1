<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 Enterprise</title>
    <style>
        :root {
            --pearl-green: #e0f2f1;
            --soft-healing: #b2dfdb;
            --accent: #10b981;
            --dark-text: #2c3e50;
        }
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background: linear-gradient(135deg, var(--pearl-green) 0%, var(--soft-healing) 100%);
            color: var(--dark-text); min-height: 100vh;
        }
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #4a148c; color: white; /* Ungu v2.1 Enterprise */
        }
        .pass-container { position: relative; width: 80%; max-width: 300px; margin: 20px 0; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: none; outline: none;
        }
        .toggle-password {
            position: absolute; right: 10px; top: 10px; cursor: pointer; color: #4a148c;
        }
        .btn-verify {
            background: var(--accent); color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-weight: bold; cursor: pointer; width: 80%; max-width: 300px;
        }
        /* Dashboard Hidden by Default */
        #dashboard { display: none; padding: 20px; padding-bottom: 90px; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .tile { 
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 15px; text-align: center; border: 1px solid white;
        }
        .tile img { width: 45px; height: 45px; margin-bottom: 8px; }
        
        /* Bottom Nav with Base44 Icon */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: white; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #ddd; z-index: 1000;
        }
        .qr-btn {
            width: 65px; height: 65px; background: var(--accent);
            border-radius: 50%; border: 5px solid white; position: relative; top: -25px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .qr-btn img { width: 35px; height: 35px; object-fit: contain; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="assets/img/icon-192.png" width="80" style="border-radius:50%; margin-bottom: 20px;">
        <div style="font-family: 'Amiri', serif; font-size: 1.5rem;">بِسْمِ اللّٰهِ</div>
        <div style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 20px;">THE POWER SOUL OF SHALAWAT</div>
        
        <div class="pass-container">
            <input type="password" id="passInput" placeholder="ACCESS KEY">
            <span class="toggle-password" onclick="togglePass()">👁️</span>
        </div>
        <button class="btn-verify" onclick="verify()">🔐 VERIFIKASI AKSES</button>
        <div style="font-size: 0.5rem; margin-top: 20px; opacity: 0.5;">ISO 27001 Certified Access Control</div>
    </div>

    <div id="dashboard">
        <h3 style="text-align:center; color: #00796b;">Dream OS | Serene Core</h3>
        <div class="app-grid">
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>Gudang</small></div>
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>Booking</small></div>
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>Security</small></div>
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>AI Hub</small></div>
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>Settings</small></div>
            <div class="tile"><img src="assets/img/icon-192.png"><br><small>Sync</small></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div style="font-size: 1.2rem;">🏠</div>
        <div style="font-size: 1.2rem;">👤</div>
        <div class="qr-btn"><img src="assets/img/icon-192.png"></div>
        <div style="font-size: 1.2rem;">ℹ️</div>
        <div style="font-size: 1.2rem;">⚙️</div>
    </nav>

    <script>
        function togglePass() {
            const p = document.getElementById('passInput');
            const icon = document.querySelector('.toggle-password');
            if(p.type === "password") { p.type = "text"; icon.innerText = "🔒"; }
            else { p.type = "password"; icon.innerText = "👁️"; }
        }

        function verify() {
            const p = document.getElementById('passInput').value;
            if(p === "DREAM13") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("Akses Ditolak! Coba lagi.");
            }
        }
    </script>
</body>
</html>
