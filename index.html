<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dream OS v2.1 - Sovereign Enterprise</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0f1e">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0a0f1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(16,185,129,0.3);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .ghost-console {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border-left: 3px solid #a855f7;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 10px;
            z-index: 9999;
            display: none;
        }
        .ghost-console.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; color: #10b981;">DREAM OS BOOTING...</p>
        <p style="margin-top: 8px; color: #64748b; font-size: 12px;">The Power Soul of Shalawat</p>
    </div>
    <div id="toast-container"></div>
    <div id="app-shell"></div>
    <div id="ghost-console" class="ghost-console"></div>
    
    <script type="module">
        import { dreamOS } from './core/system.js';
        import { dbRecovery } from './core/database-recovery.js';
        import { ghostScanner } from './core/ghost-scanner.js';
        
        // Global ghost access
        window.ghostScanner = ghostScanner;
        window.dbRecovery = dbRecovery;
        
        // Ghost mode activation on console
        console.log('%c👻 GHOST MODE: Type ghostScanner.scan() for system diagnosis', 'color: #a855f7; font-size: 12px;');
        console.log('%c👻 GHOST MODE: Type ghostScanner.recover() for emergency recovery', 'color: #a855f7;');
        console.log('%c👻 GHOST MODE: Type ghostScanner.export() to export all data', 'color: #a855f7;');
        
        // Show ghost console on triple click
        let clickCount = 0;
        let clickTimer;
        document.addEventListener('click', () => {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => clickCount = 0, 1000);
            if (clickCount === 3) {
                const console = document.getElementById('ghost-console');
                console.classList.toggle('active');
                if (console.classList.contains('active')) {
                    console.innerHTML = `
                        <i class="fas fa-ghost"></i> Ghost Console Active<br>
                        📊 ghostScanner.scan() - Full system scan<br>
                        🔄 ghostScanner.recover() - Emergency recovery<br>
                        📁 ghostScanner.export() - Export all data<br>
                        💾 dbRecovery.emergencyBackup() - Create backup
                    `;
                }
                clickCount = 0;
            }
        });
        
        // Initialize system
        try {
            await dbRecovery.init();
            await dreamOS.init();
            
            // Load main app
            const authModule = await dreamOS.loadModule('auth');
            const app = await authModule.render({
                user: null,
                toast: (msg) => { console.log(msg); }
            });
            
            document.getElementById('app-shell').innerHTML = app;
            
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }
            }, 1000);
            
        } catch (error) {
            console.error('Fatal error:', error);
            dreamOS.enterGhostMode('system_init_failed');
            
            // Ghost mode fallback UI
            document.getElementById('app-shell').innerHTML = `
                <div style="text-align:center;padding:50px;">
                    <i class="fas fa-ghost" style="font-size:64px;color:#a855f7;"></i>
                    <h2 style="color:#a855f7;">Ghost Mode Active</h2>
                    <p>System in emergency recovery mode</p>
                    <div style="margin-top:20px;background:rgba(0,0,0,0.5);padding:20px;border-radius:12px;text-align:left;">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <button onclick="ghostScanner.scan().then(r=>alert('Scan complete. Check console.'))" 
                            style="margin-top:10px;background:#a855f7;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">
                            Run System Scan
                        </button>
                        <button onclick="ghostScanner.recover()" 
                            style="margin-top:10px;margin-left:10px;background:#10b981;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">
                            Emergency Recovery
                        </button>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) loading.style.display = 'none';
            }, 1000);
        }
    </script>
</body>
</html>
