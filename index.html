<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 - Sovereign Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="core/engine.css">
    
    <style>
        :root { --emerald-primary: #10b981; --slate-dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--slate-dark); color: white; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .glass-effect { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body class="bg-slate-950">
    <div id="app-shell"></div>

    <script>
        /**
         * DREAM SYSTEM UTILITIES (KERNEL CORE)
         */
        window.DREAM_SYS = {
            haptic: (p = 50) => { if ('vibrate' in navigator) navigator.vibrate(p); },
            log: (t, m, d = '') => {
                const s = {info:'color:#06b6d4', success:'color:#10b981', warn:'color:#f59e0b', error:'color:#ef4444', ghost:'color:#8b5cf6'};
                console.log(`%c[DREAM ${t.toUpperCase()}] %c${m}`, s[t]||'', 'color:inherit;', d);
            }
        };

        window.DREAM_SECURITY = {
            getFingerprint: () => {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl');
                    const renderer = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "";
                    return btoa(`${screen.width}x${screen.height}|${renderer}|${navigator.hardwareConcurrency}`);
                } catch (e) { return "unknown-dev-id"; }
            }
        };

        // Konfigurasi Global (Trinity Architecture)
        window.DREAM = {
            version: '2.1.0-Sovereign',
            env: 'production',
            config: {
                supabase: { 
                    url: 'https://pvznaeppaagylwddirla.supabase.co', 
                    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...' // Key Anda
                },
                safeZone: { radius: 5, center: { lat: -6.4025, lng: 106.7942 } } // Koordinat Depok
            },
            state: { currentModule: 'home', user: null, isPanic: false },
            modules: new Map(),
            load: (name) => {
                window.DREAM_SYS.log('info', `Switching to module: ${name}`);
                // Logic untuk load module akan dirender di shell.js
            }
        };

        /**
         * GHOST BYPASS SYSTEM (Fixed Logic)
         * Mengetuk header 5x dalam 2 detik untuk akses rahasia.
         */
        (function() {
            let taps = 0;
            let tapTimer;
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.shell-header')) return;
                
                taps++;
                window.DREAM_SYS.haptic(30);
                clearTimeout(tapTimer);
                
                if (taps === 5) {
                    taps = 0;
                    const pwd = prompt('👻 Ghost Architect Access:');
                    if (pwd === 'dreamos2026') {
                        window.DREAM_SYS.log('ghost', 'Stealth Mode Activated');
                        window.DREAM.load('ghost');
                    } else {
                        alert('Access Denied');
                    }
                }
                tapTimer = setTimeout(() => { taps = 0; }, 2000);
            });
        })();
    </script>
